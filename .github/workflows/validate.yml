name: Validate Game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JavaScript syntax check
        run: node --check game.js
      - name: Required files and UI hooks
        run: |
          test -f index.html
          test -f style.css
          test -f team.css
          grep -q 'id="passwordInput"' index.html
          grep -q 'id="teamGrid"' index.html
          grep -q 'id="classSkillBar"' index.html
          grep -q "const ROLES" game.js
